name: Build and deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - name: Download OGP font
        run: |
          mkdir -p fonts
          curl -sLo fonts/NotoSansCJKjp-Bold.otf "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/Japanese/NotoSansCJKjp-Bold.otf"
      - name: Fetch lab posts
        run: |
          git clone --depth 1 https://github.com/5beneono/lab.git /tmp/lab
          mkdir -p ./lab
          cp -r /tmp/lab/posts/*.md ./lab/
          sed -i 's/^tags: \[\]$/tags: [lab]/' ./lab/*.md
      - run: deno task build
      - run: rm -rf _site/fonts
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
